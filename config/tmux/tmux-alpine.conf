# Copy/selection colors
setw -g mode-style fg=#575279,bg=#dfdad9

# Alert message line
set -g message-style fg=#575279,bg=#f2e9e1,bold
set -g message-command-style fg=#575279,bg=#f2e9e1

# Status line activity
setw -g window-status-activity-style fg=#575279,bg=#f2e9e1

# Pane borders
set -g pane-border-style fg=#9893a5,bg=#faf4ed
set -g pane-active-border-style fg=#286983,bg=#faf4ed

# Statusline
set -g status on
set -g status-interval 1
set -g status-left-length 30
set -g status-left "#[fg=#faf4ed,bg=#286983,nobold]  #S #[fg=#286983,bg=#f2e9e1,nobold,noitalics,nounderscore]⫸ "
set -g status-right "#{prefix_highlight}#[fg=#2c7491,bg=#f2e9e1,nobold,noitalics,nounderscore]#[fg=#faf4ed,bg=#2c7491]#(osascript -l JavaScript ~/.dotfiles/bin/tunes.js light)#[fg=#2c7491,bg=#f2e9e1,nobold,noitalics,nounderscore]#[fg=#faf4ed,bg=#2c7491] %b %d #[fg=#f2e9e1,bg=#2c7491,nobold,noitalics,nounderscore]#[fg=#2c7491,bg=#f2e9e1] #[fg=#286983,bg=#f2e9e1,nobold,noitalics,nounderscore]#[fg=#faf4ed,bg=#286983] %R #[fg=#f2e9e1,bg=#286983,nobold,noitalics,nounderscore]#[fg=#286983,bg=#f2e9e1]#{online_status}"

set -g @online_icon "#[default]"

# tmux-prefix-highlight
set -g @prefix_highlight_fg '#faf4ed'
set -g @prefix_highlight_bg '#c66000'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix '  '
set -g @prefix_highlight_copy_mode_attr 'fg=#faf4ed,bg=#3d7a57'

set -g @offline_icon " #[fg=#c2384e,bg=#f2e9e1,nobold,noitalics,nounderscore]#[fg=#faf4ed,bg=#c2384e,bold] 󰅛 OFFLINE #[fg=#faf4ed,bg=#c2384e,nobold,noitalics,nounderscore]#[fg=#c2384e,bg=#f2e9e1]"

set -g status-right-length 150
set -g window-status-format "#[fg=#f2e9e1,bg=#dfdad9]#[fg=#9893a5,bg=#dfdad9,nobold,noitalics,nounderscore] #I#[fg=#9893a5,bg=#dfdad9,nobold,noitalics,nounderscore]❯ #[fg=#575279,bg=#dfdad9]#W #[fg=#dfdad9,bg=#f2e9e1]"
set -g window-status-current-format "#[fg=#faf4ed,bg=#286983,nobold,noitalics,nounderscore] #[fg=#faf4ed,bg=#286983]#I#[fg=#faf4ed,bg=#286983,nobold,noitalics,nounderscore]❱ #[fg=#faf4ed,bg=#286983] #W #[fg=#286983,bg=#f2e9e1,nobold,noitalics,nounderscore]"
set -g window-status-separator ""

# Window Titles
set -g set-titles on
set -g set-titles-string '[#I] #W'

# --- colors (AlpineDawn)
set -g status-style fg=#575279,bg=#f2e9e1
setw -g window-status-style fg=#9893a5
setw -g window-status-current-style fg=#faf4ed,bg=#286983
set -g display-panes-active-colour '#286983'
set -g display-panes-colour '#dfdad9'
setw -g clock-mode-colour '#286983'

# Plugins that interpolate status-right must load here (after status-right is set)
run-shell ~/.config/tmux/plugins/tmux-prefix-highlight/prefix_highlight.tmux
run-shell ~/.config/tmux/plugins/tmux-online-status/online_status.tmux
