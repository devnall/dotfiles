- defaults:
    link:
      relink: true
      create: true

- link:
    ~/.zshrc:
      path: zsh/zshrc.zsh
      force: true
    ~/.config/zsh/lib:
      path: zsh/lib
      force: true
    ~/.config/zsh/zfunctions:
      path: zsh/zfunctions
      force: true

    ~/.config/tmux/tmux.conf:
      path: config/tmux/tmux.conf
      force: true
    ~/.config/tmux/tmux-nordic.conf:
      path: config/tmux/tmux-nordic.conf
      force: true
    ~/.config/tmux/tmux-alpine.conf:
      path: config/tmux/tmux-alpine.conf
      force: true
    ~/.config/tmux/plugins:
      path: config/tmux/plugins
      force: true

    ~/.vimrc:
      path: config/vim/vimrc
    ~/.config/nvim:
      path: config/nvim
      force: true

    ~/.bashrc:
      path: config/bash/bashrc
      force: true

    ~/.config/ghostty:
      path: config/ghostty
      force: true

    ~/.config/sheldon:
      path: config/sheldon
      force: true

    ~/.config/starship.toml:
      path: config/starship/starship.toml

    ~/.config/starship-light.toml:
      path: config/starship/starship-light.toml

    ~/.config/starship-remote.toml:
      path: config/starship/starship-remote.toml

    ~/.claude/settings.json:
      path: config/claude/settings.json
      force: true
    ~/.claude/statusline-command.sh:
      path: config/claude/statusline-command.sh
      force: true

    ~/.config/mise/config.toml:
      path: config/mise/config.toml
      force: true

    ~/.ripgreprc:
      path: config/ripgrep/.ripgreprc

    ~/.config/bat/config:
      path: config/bat/config
    ~/.config/bat/themes/rose-pine-dawn.tmTheme:
      path: config/bat/themes/rose-pine-dawn.tmTheme

    ~/.config/btop:
      path: config/btop

    ~/.gitconfig:
      path: config/git/config
      force: true
    ~/.config/git/ignore:
      path: config/git/ignore
      force: true

    ~/.ssh/config:
      path: config/ssh/config
      force: true

    ~/bin:
      glob: true
      path: bin/*

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    -
     command: '([[ "$(uname)" == "Darwin" ]] || [[ -f ~/.remote-full ]]) && ./config/macos/setup-homebrew.sh || true'
     description: Installing Homebrew and essential packages
     stdout: true
    -
     command: '([[ "$(uname)" == "Darwin" ]] || [[ -f ~/.remote-full ]]) && brew bundle --file=packages/Brewfile.universal || true'
     description: Install universal Homebrew packages
     stdout: true
    -
     command: '[[ -f ~/.work ]] && brew bundle --file=packages/Brewfile.work || true'
     description: Install work Homebrew packages
     stdout: true
    -
     command: '[[ -f ~/.personal ]] && brew bundle --file=packages/Brewfile.personal || true'
     description: Install personal Homebrew packages
     stdout: true
    -
     command: 'command -v bat > /dev/null && bat cache --build || true'
     description: Build bat theme cache
     stdout: true
