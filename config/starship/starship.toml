# Spaceship Prompt Config
#
# Requires a nerd font

# prompt-wide config options
add_newline = true

# Order
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$golang\
$kubernetes\
$helm\
$python\
$ruby\
$terraform\
$vagrant\
$aws\
$env_var\
$custom\
$cmd_duration\
$line_break\
$jobs\
$time\
$status\
$shell\
$character"""

[aws]
symbol = "¯×¡ "
style = "bold yellow"

[character]
success_symbol = "[ÔØ»](bold blue)[ÔØ»](bold cyan)[ÔØ»](bold green)"
error_symbol = "[Ô£û](bold red)[Ô£û](bold red)[ÔØ»](bold red)"
vicmd_symbol ="[¯ÿ½](bold green)[ÔØ»](bold blue)"

[cmd_duration]
show_notifications = false
min_time_to_notify = 30_000

[directory]
truncation_length = 5
read_only = "´Çú"
read_only_style = "bold red"
home_symbol = '´Çò ~'

[directory.substitutions]
# Show the icon if in base ~ dir but don't show it when in subdirs
"´Çò ~/" = "~/"

[docker_context]
symbol = "´îê "
style = "bold blue"

[git_branch]
format = "[$symbol on $branch(:$remote_branch) ]($style)"
symbol = "¯£Ñ"
style = "bold green"

[git_metrics]
disabled = false
added_style = "green"

[git_status]
style = "white dimmed"
conflicted = "´ü╣"
ahead = "´üó"
behind = "´üú"
diverged = "´¡Ç"
untracked = "´ä¿"
stashed = "´Æç"
modified = "´ä¬"
staged = "´üº"
renamed = "´£É"
deleted = "´Çö"

[golang]
symbol = "¯ÿª"

[helm]
symbol = "´┤▒"

[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
ssh_symbol = "¯¼ü "

[jobs]
symbol = "´éà "
style = "bold red"

[kubernetes]
disabled = false
symbol = "´┤▒"
style    = "fg:#3DA2FF"       # kube-ish bright blue
format   = "[$symbol $context:$namespace]($style) "
# only show if auth'ed to AWS
detect_env_vars = ['AWS_VAULT']

[[kubernetes.contexts]]
context_pattern = "prod"
style = "fg:#E16C58"

[python]
symbol = "¯êÁ "
style = "green"

[ruby]
symbol = "¯£╣ "

[terraform]
symbol = "TF´å│  "


# Disable the package module, hiding it from the prompt completely
[package]
disabled = true
