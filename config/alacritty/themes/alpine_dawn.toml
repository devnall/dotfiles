# Alacritty Theme — AlpineDawn (Rose Pine Dawn)

# Default colors
[colors.primary]
background = '#faf4ed'
foreground = '#575279'

# Normal colors
[colors.normal]
black   = '#f2e9e1'  # black (overlay)
red     = '#b4637a'  # red (love)
green   = '#286983'  # green (pine)
yellow  = '#ea9d34'  # yellow (gold)
blue    = '#286983'  # blue (pine)
magenta = '#907aa9'  # magenta (iris)
cyan    = '#56949f'  # cyan (foam)
white   = '#575279'  # white (base fg)

# Bright colors
[colors.bright]
black   = '#9893a5'  # bright black (muted)
red     = '#b4637a'  # bright red (love)
green   = '#286983'  # bright green (pine)
yellow  = '#ea9d34'  # bright yellow (gold)
blue    = '#56949f'  # bright blue (foam)
magenta = '#907aa9'  # bright magenta (iris)
cyan    = '#56949f'  # bright cyan (foam)
white   = '#575279'  # bright white (base fg)

[colors.selection]
background = '#f2e9e1'
foreground = '#575279'

# NOTE: To switch to AlpineDawn manually, update alacritty.toml import to:
#   "~/.config/alacritty/themes/alpine_dawn.toml"
