# Starship Prompt Config — remote/server variant
#
# Requires a nerd font

palette = "nordicpine"

add_newline = true

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$helm\
$python\
$ruby\
$nodejs\
$terraform\
$aws\
$env_var\
$custom\
$cmd_duration\
$line_break\
$jobs\
$time\
$status\
$shell\
$character"""

[aws]
symbol = " "
style = "bold aws_col"

[character]
success_symbol = "[❯](bold char_1)[❯](bold char_2)[❯](bold char_3)"
error_symbol = "[✖](bold char_err)[✖](bold char_err)[❯](bold char_err)"
vicmd_symbol = "[](bold char_3)[❯](bold char_1)"

[cmd_duration]
show_notifications = false
min_time_to_notify = 30_000

[directory]
truncation_length = 5
read_only = ""
read_only_style = "bold red"
home_symbol = " ~"
style = "bold dir"

[directory.substitutions]
" ~/" = "~/"

[docker_context]
symbol = " "
style = "bold docker_col"
format = "[$symbol$context]($style) "
only_with_files = true

[git_branch]
format = "[$symbol on $branch(:$remote_branch) ]($style)"
symbol = ""
style = "bold branch"

[git_metrics]
disabled = false
added_style = "bold git_add"
deleted_style = "bold git_del"

[git_status]
style = "git_status"
conflicted = ""
ahead = ""
behind = ""
diverged = "נּ"
untracked = ""
stashed = ""
modified = ""
staged = ""
renamed = ""
deleted = ""

[helm]
symbol = "⎈ "
style = "bold helm_col"
format = "[$symbol($version )]($style)"

[hostname]
ssh_only = true
format = "[$ssh_symbol$hostname]($style) "
ssh_symbol = " "

[jobs]
symbol = " "
style = "bold jobs_col"

[kubernetes]
disabled = true

[nodejs]
symbol = " "
style = "bold node_col"
format = "[$symbol($version )]($style)"
detect_files = ['package.json', '.node-version', '.nvmrc']
detect_folders = ['node_modules']

[python]
symbol = " "
style = "bold python_col"
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"
detect_extensions = ['py']
detect_files = ['requirements.txt', '.python-version', 'pyproject.toml', 'setup.py', 'setup.cfg', 'tox.ini', 'Pipfile', 'poetry.lock']
detect_folders = ['.venv', 'venv']

[ruby]
symbol = " "
style = "bold ruby_col"
format = "[$symbol($version )]($style)"
detect_files = ['Gemfile', '.ruby-version', '.rvmrc', 'Rakefile']
detect_extensions = ['rb']
detect_folders = []

[terraform]
symbol = "󱁢 "
style = "bold tf_col"
format = "[$symbol$workspace]($style) "

[package]
disabled = true

[palettes.nordicpine]
dir        = "#6ab4c2"
branch     = "#38c9a7"
git_add    = "#38c9a7"
git_del    = "#e16c58"
git_status = "#c6e0df"
aws_col    = "#ddbc44"
k8s_col    = "#087fab"
k8s_prod   = "#e16c58"
docker_col = "#257994"
helm_col   = "#6ab4c2"
tf_col     = "#cca2c0"
python_col = "#38c9a7"
ruby_col   = "#e16c58"
node_col   = "#38c9a7"
char_1     = "#087fab"
char_2     = "#6ab4c2"
char_3     = "#38c9a7"
char_err   = "#e16c58"
jobs_col   = "#e16c58"
