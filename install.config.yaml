- defaults:
    link:
      relink: true
      create: true

- shell:
    - command: 'test -f config/btop/btop.conf || cp config/btop/btop.conf.default config/btop/btop.conf'
      description: Initialize btop.conf from default (no-overwrite)
    - command: 'test -f config/starship/starship.toml || cp config/starship/starship.toml.default config/starship/starship.toml'
      description: Initialize starship.toml from default (no-overwrite)
    - command: '[[ "$(uname)" == "Darwin" ]] && ln -sf "$HOME/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock" "$HOME/.1p-agent.sock" || true'
      description: Create no-space symlink for 1Password SSH agent socket (macOS only)

# Link convention:
#   force: true  — repo-authoritative config, always overwrite the target
#   (default)    — user-customizable config initialized from defaults; relink: true
#                  removes stale symlinks but won't clobber a real file
- link:
    # Shell
    ~/.zprofile:
      path: zsh/zprofile.zsh
      force: true
    ~/.zshrc:
      path: zsh/zshrc.zsh
      force: true
    ~/.config/zsh/lib:
      path: zsh/lib
      force: true
    ~/.config/zsh/zfunctions:
      path: zsh/zfunctions
      force: true
    ~/.bashrc:
      path: config/bash/bashrc
      force: true
    ~/.config/sheldon:
      path: config/sheldon
      force: true

    # Editors
    ~/.vim:
      path: config/vim
      force: true
    ~/.config/nvim:
      path: config/nvim
      force: true

    # Terminal & multiplexer
    ~/.config/ghostty:
      path: config/ghostty
      force: true
    ~/.config/tmux/tmux.conf:
      path: config/tmux/tmux.conf
      force: true
    ~/.config/tmux/tmux-nordic.conf:
      path: config/tmux/tmux-nordic.conf
      force: true
    ~/.config/tmux/tmux-alpine.conf:
      path: config/tmux/tmux-alpine.conf
      force: true
    ~/.config/tmux/plugins:
      path: config/tmux/plugins
      force: true

    # Prompt & theme
    ~/.config/starship.toml:
      path: config/starship/starship.toml
    ~/.config/starship-remote.toml:
      path: config/starship/starship-remote.toml

    # Dev tools
    ~/.gitconfig:
      path: config/git/config
      force: true
    ~/.config/git/ignore:
      path: config/git/ignore
      force: true
    ~/.ssh/config:
      path: config/ssh/config
      force: true
    ~/.config/mise/config.toml:
      path: config/mise/config.toml
      force: true
    ~/.ripgreprc:
      path: config/ripgrep/.ripgreprc
    ~/.config/bat/config:
      path: config/bat/config
    ~/.config/bat/themes/rose-pine-dawn.tmTheme:
      path: config/bat/themes/rose-pine-dawn.tmTheme
    ~/.config/btop:
      path: config/btop
    ~/.config/glow:
      path: config/glow
      force: true

    # Raycast
    ~/.config/raycast/scripts:
      path: config/raycast/scripts
      force: true

    # AI tools
    ~/.claude/settings.json:
      path: config/claude/settings.json
      force: true
    ~/.claude/statusline-command.sh:
      path: config/claude/statusline-command.sh
      force: true

    # Wallpapers
    ~/.local/share/wallpapers:
      path: wallpapers
      force: true

    # macOS-specific
    ~/Library/LaunchAgents/com.dnall.dark-notify.plist:
      path: config/launchagents/com.dnall.dark-notify.plist
      force: true
    ~/Library/Application Support/tealdeer/pages:
      path: docs/tldr
      force: true
      create: true

    # Scripts
    ~/bin:
      glob: true
      path: bin/*

- shell:
    -
     command: 'command -v brew > /dev/null || { echo "⚠ Homebrew not found. Run ./bin/bootstrap.sh first or install manually."; }'
     description: Verify Homebrew is available
    -
     command: '([[ "$(uname)" == "Darwin" ]] || [[ -f ~/.remote-full ]]) && brew bundle --file=packages/Brewfile.universal || true'
     description: Install universal Homebrew packages
     stdout: true
    -
     command: '[[ -f ~/.work ]] && brew bundle --file=packages/Brewfile.work || true'
     description: Install work Homebrew packages
     stdout: true
    -
     command: '[[ -f ~/.personal ]] && brew bundle --file=packages/Brewfile.personal || true'
     description: Install personal Homebrew packages
     stdout: true
    -
     command: '[[ -f packages/Brewfile.local ]] && brew bundle --file=packages/Brewfile.local || true'
     description: Install local Homebrew packages
     stdout: true
    -
     command: 'command -v bat > /dev/null && bat cache --build || true'
     description: Build bat theme cache
     stdout: true
    -
     command: 'command -v pre-commit > /dev/null && [ -d .git ] && pre-commit install || true'
     description: Install pre-commit git hooks
    -
     command: |
       if [[ "$(uname)" == "Darwin" ]] && command -v dark-notify > /dev/null; then
         launchctl bootout gui/$(id -u) ~/Library/LaunchAgents/com.dnall.dark-notify.plist 2>/dev/null || true
         launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.dnall.dark-notify.plist
       fi
     description: Load dark-notify LaunchAgent
     stdout: true
