- defaults:
    link:
      relink: true
      create: true

- shell:
    - command: 'test -f config/btop/btop.conf || cp config/btop/btop.conf.default config/btop/btop.conf'
      description: Initialize btop.conf from default (no-overwrite)
    - command: 'test -f config/starship/starship.toml || cp config/starship/starship.toml.default config/starship/starship.toml'
      description: Initialize starship.toml from default (no-overwrite)
    - command: '[[ "$(uname)" == "Darwin" ]] && ln -sf "$HOME/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock" "$HOME/.1p-agent.sock" || true'
      description: Create no-space symlink for 1Password SSH agent socket (macOS only)

# Link convention:
#   force: true  — repo-authoritative config, always overwrite the target
#   (default)    — user-customizable config initialized from defaults; relink: true
#                  removes stale symlinks but won't clobber a real file
- link:
    # Shell
    ~/.zprofile:
      path: zsh/zprofile.zsh
      force: true
    ~/.zshrc:
      path: zsh/zshrc.zsh
      force: true
    ~/.config/zsh/lib:
      path: zsh/lib
      force: true
    ~/.config/zsh/zfunctions:
      path: zsh/zfunctions
      force: true
    ~/.bashrc:
      path: config/bash/bashrc
      force: true
    ~/.config/sheldon:
      path: config/sheldon
      force: true

    # Editors
    ~/.vim:
      path: config/vim
      force: true
    ~/.config/nvim:
      path: config/nvim
      force: true

    # Terminal & multiplexer
    ~/.config/ghostty:
      path: config/ghostty
      force: true
    ~/.config/tmux/tmux.conf:
      path: config/tmux/tmux.conf
      force: true
    ~/.config/tmux/tmux-nordic.conf:
      path: config/tmux/tmux-nordic.conf
      force: true
    ~/.config/tmux/tmux-alpine.conf:
      path: config/tmux/tmux-alpine.conf
      force: true
    ~/.config/tmux/plugins:
      path: config/tmux/plugins
      force: true

    # Prompt & theme
    ~/.config/starship.toml:
      path: config/starship/starship.toml
    ~/.config/starship-remote.toml:
      path: config/starship/starship-remote.toml

    # Dev tools
    ~/.gitconfig:
      path: config/git/config
      force: true
    ~/.config/git/ignore:
      path: config/git/ignore
      force: true
    ~/.ssh/config:
      path: config/ssh/config
      force: true
    ~/.config/mise/config.toml:
      path: config/mise/config.toml
      force: true
    ~/.ripgreprc:
      path: config/ripgrep/.ripgreprc
    ~/.config/bat/config:
      path: config/bat/config
    ~/.config/bat/themes/rose-pine-dawn.tmTheme:
      path: config/bat/themes/rose-pine-dawn.tmTheme
    ~/.config/bat/themes/nordicpine.tmTheme:
      path: config/bat/themes/nordicpine.tmTheme
    ~/.config/btop:
      path: config/btop
    ~/.config/glow:
      path: config/glow
      force: true

    # Raycast
    ~/.config/raycast/scripts:
      path: config/raycast/scripts
      force: true

    # AI tools
    ~/.claude/statusline-command.sh:
      path: config/claude/statusline-command.sh
      force: true
    ~/.claude/commands:
      path: config/claude/commands
      force: true

    # Wallpapers
    ~/.local/share/wallpapers:
      path: wallpapers
      force: true

    # macOS-specific
    ~/Library/LaunchAgents/com.dnall.dark-notify.plist:
      path: config/launchagents/com.dnall.dark-notify.plist
      force: true
    ~/Library/Application Support/tealdeer/pages:
      path: docs/tldr
      force: true
      create: true

    # Scripts
    ~/bin:
      glob: true
      path: bin/*

- shell:
    -
     # Reset the failure log (consumed by the summary step at the end) before any
     # bundle runs, so a clean install never reports stale failures.
     command: 'rm -f "${TMPDIR:-/tmp}/dotfiles-brew-failures"; command -v brew > /dev/null || { echo "⚠ Homebrew not found. Run ./bin/bootstrap.sh first or install manually."; }'
     description: Verify Homebrew is available
    # Homebrew 6+ ships HOMEBREW_REQUIRE_TAP_TRUST on by default: it refuses to
    # load non-official taps until they're trusted, so `brew bundle` errors on a
    # fresh machine the first time it hits a `tap "..."` line. brew-trust-taps
    # prompts for each untrusted tap (with origin + what it provides) rather than
    # trusting them silently — auto-trusting would defeat the safeguard. Already-
    # trusted taps are skipped; no-op on Homebrew < 6 and non-brew hosts.
    -
     command: 'bash bin/brew-trust-taps'
     description: Review & trust non-official Homebrew taps declared in Brewfiles (Homebrew 6+)
     stdout: true
     stdin: true
    # --no-upgrade keeps ./install idempotent: missing packages install, but
    # already-installed casks/MAS apps that have self-updated past the cask
    # version stay put. Use `brew upgrade` for intentional upgrades.
    # Each bundle step is non-blocking (install never aborts on a bad entry), but
    # a failure is recorded to the log and surfaced by the summary step below —
    # `brew bundle` aborts the *whole* file on one unresolved entry, so the rest
    # of that Brewfile may be missing too. The `if`/`fi` guard means the warning
    # fires only on a real bundle failure, never when the marker is just absent.
    -
     command: 'if [[ "$(uname)" == "Darwin" ]] || [[ -f ~/.remote-full ]]; then brew bundle --no-upgrade --file=packages/Brewfile.universal || { echo "⚠ Brewfile.universal: some packages failed to install (see output above)"; echo "Brewfile.universal" >> "${TMPDIR:-/tmp}/dotfiles-brew-failures"; }; fi'
     description: Install universal Homebrew packages
     stdout: true
    -
     command: 'if [[ -f ~/.work ]]; then brew bundle --no-upgrade --file=packages/Brewfile.work || { echo "⚠ Brewfile.work: some packages failed to install (see output above)"; echo "Brewfile.work" >> "${TMPDIR:-/tmp}/dotfiles-brew-failures"; }; fi'
     description: Install work Homebrew packages
     stdout: true
    -
     command: 'if [[ -f ~/.personal ]]; then brew bundle --no-upgrade --file=packages/Brewfile.personal || { echo "⚠ Brewfile.personal: some packages failed to install (see output above)"; echo "Brewfile.personal" >> "${TMPDIR:-/tmp}/dotfiles-brew-failures"; }; fi'
     description: Install personal Homebrew packages
     stdout: true
    -
     command: 'if [[ -f packages/Brewfile.local ]]; then brew bundle --no-upgrade --file=packages/Brewfile.local || { echo "⚠ Brewfile.local: some packages failed to install (see output above)"; echo "Brewfile.local" >> "${TMPDIR:-/tmp}/dotfiles-brew-failures"; }; fi'
     description: Install local Homebrew packages
     stdout: true
    -
     command: 'command -v bat > /dev/null && bat cache --build || true'
     description: Build bat theme cache
     stdout: true
    -
     command: 'command -v jq > /dev/null && bash bin/claude-settings-build || true'
     description: Build ~/.claude/settings.json from layered sources (marker-driven)
     stdout: true
    -
     command: 'command -v pre-commit > /dev/null && [ -d .git ] && pre-commit install || true'
     description: Install pre-commit git hooks
    -
     command: |
       if [[ "$(uname)" == "Darwin" ]] && command -v dark-notify > /dev/null; then
         launchctl bootout gui/$(id -u) ~/Library/LaunchAgents/com.dnall.dark-notify.plist 2>/dev/null || true
         launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.dnall.dark-notify.plist
       fi
     description: Load dark-notify LaunchAgent
     stdout: true
    -
     command: |
       fails="${TMPDIR:-/tmp}/dotfiles-brew-failures"
       if [[ -s "$fails" ]]; then
         echo ""
         echo "═══════════════════════════════════════════════════════════════"
         echo "⚠  Some Homebrew packages failed to install and need attention:"
         while read -r bf; do
           echo "     • $bf  →  recheck: brew bundle check --file=packages/$bf"
         done < "$fails"
         echo ""
         echo "   One unresolved entry aborts the rest of that Brewfile, so other"
         echo "   packages in it may be missing too. Fix or remove the entry, then"
         echo "   re-run ./install."
         echo "═══════════════════════════════════════════════════════════════"
         rm -f "$fails"
       fi
       true
     description: Report any Homebrew packages that failed to install
     stdout: true
