##############################################
# .tmux.conf                                 #
##############################################


###################################
# Basic Environment Configuration #
###################################

# Start window and pane index from 1
set -g base-index 1
setw -g pane-base-index 1

# Set 256 color terminal
set -g default-terminal "tmux-256color"

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# Automatically set window title
setw -g automatic-rename on

# Automatically renumber windows
set -g renumber-windows on

# Allow for faster key repetition
set -g repeat-time 0

# Mouse
set -g mouse on

# Constrain window size to the max size of any client connected to *that window*
# (as opposed to default: constrain to max size of any client connected to the *session*)
setw -g aggressive-resize on

# Increase history limit
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# emacs key bindings in tmux command prompt are better than vi keys, even for vim users
set -g status-keys emacs

# vi-style controls for copy mode
setw -g mode-keys vi

# No escape time for vi mode
set -s escape-time 0

# Focus Events enabled for terminals that support them
set -g focus-events on

# Explicitly define shell (shouldn't be necessary as default-command should cover it)
set -g default-shell $SHELL

###################################
# Key Bindings                    #
###################################

# Unbind default stuff I don't use
unbind C-z
unbind C-b
unbind .
unbind D
unbind PPage
unbind '"'
unbind "'"
unbind %
unbind [
unbind n
unbind p
unbind d
unbind C-d
unbind &
unbind i
unbind z
unbind -
unbind '$'
unbind Up
unbind Down
unbind Escape

# Prefix key
set -g prefix C-a
# Ctrl+A to send prefix to a nested tmux/screen session
bind C-a send-prefix

# Exit
bind x kill-pane
bind X confirm-before -p "tmux kill-window #W? (y/n)" kill-window
bind q confirm-before -p "tmux kill-session #S? (y/n)" kill-session
bind Q confirm-before -p "tmux kill-server? This will nuke all running tmux processes! (y/n)" kill-server
bind C-d confirm-before -p "tmux detach-client from current session? (y/n)" detach-client

# Split
bind \\ split-window -h -c "#{pane_current_path}"
bind | split-window -fh -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"

# vim copy selection
bind [ copy-mode
bind p paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# bind : to command-prompt like vim
# this is the default in tmux already
#bind : command-prompt

# vim key map
bind \; command-prompt

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# Resize panes with capital vim movement keys, 10 lines at a time
# or lowercase, 5 lines at a time
bind C-H resize-pane -L 5
bind C-L resize-pane -R 5
bind C-J resize-pane -D 5
bind C-K resize-pane -U 5

# Toggle zooming selected pane to fill the window
bind + resize-pane -Z
bind = resize-pane -Z

# Move around between windows and move windows around
bind , previous-window # <
bind C-p previous-window # <
bind . next-window # >
bind C-n next-window # >
bind < swap-window -t :-
bind > swap-window -t :+

# Toggle pane synchronization (mnemonic: e is for echo)
bind e run "tmux setw synchronize-panes; tmux display-message 'sync-panes: #{?synchronize-panes,ON,OFF}'"

# Space to jump to last window
bind Space last-window

# SSH to a host via fzf picker (falls back to prompt if fzf unavailable)
bind S if-shell "command -v fzf" \
  "display-popup -E -w 60% -h 60% '~/bin/tmux-ssh-fzf'" \
  "command-prompt -p ssh: \"new-window -n %1 'ssh %1'\""

# Reload tmux.conf
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Refresh client
bind R refresh-client

# Rename windows/sessions
bind n command-prompt "rename-window %%"
bind N command-prompt "rename-session %%"


# Testing
set -g update-environment -r # Added 7.27.15

###################################
# Appearance                      #
###################################

if-shell 'defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark' \
  'source-file ~/.config/tmux/tmux-nordic.conf' \
  'source-file ~/.config/tmux/tmux-alpine.conf'

# Enable 24-bit color support
set-option -sa terminal-overrides ",xterm-256color:Tc"

#tm_separator_left_bold="◀"
#tm_separator_left_thin="❮"
#tm_separator_right_bold="▶"
#tm_separator_right_thin="❯"
# ❱ ❯ ⫸
# ❬ ❮ ❰


# Plugin options

# tmux-online-status
set -g @route_to_ping "google.com"   # DNS + routing check (Option B)
# set -g @route_to_ping "8.8.8.8"   # IP routing only (Option A)

# tmux-prefix-highlight
set -g @prefix_highlight_fg '#0f111a'
set -g @prefix_highlight_bg '#38c9a7'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_output_prefix '#[fg=#38c9a7]#[bg=#0f111a]#[nobold]#[noitalics]#[nounderscore]#[bg=#38c9a7]#[fg=#0f111a]'
set -g @prefix_highlight_output_suffix ''
set -g @prefix_highlight_copy_mode_attr 'fg=#38c9a7,bg=#0f111a,bold'

# Plugins (loaded as git submodules — no TPM dependency)
# Note: vim-tmux-navigator needs the neovim counterpart plugin to be useful (see neovim overhaul TODO)
run-shell ~/.config/tmux/plugins/tmux-prefix-highlight/prefix_highlight.tmux
run-shell ~/.config/tmux/plugins/tmux-open/open.tmux
run-shell ~/.config/tmux/plugins/tmux-online-status/online_status.tmux
run-shell ~/.config/tmux/plugins/tmux-yank/yank.tmux
run-shell ~/.config/tmux/plugins/extrakto/extrakto.tmux
run-shell ~/.config/tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux
